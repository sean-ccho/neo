name: Neo Battery Monitor

on:
  schedule:
    # EST (UTC-5) schedule times
    - cron: '0 11 * * *'   # 6:00 AM EST
    - cron: '0 13 * * *'   # 8:00 AM EST
    - cron: '0 17 * * *'   # 12:00 PM EST
    - cron: '0 21 * * *'   # 4:00 PM EST
    - cron: '0 1 * * *'    # 8:00 PM EST
    - cron: '0 3 * * *'    # 10:00 PM EST
    - cron: '0 5 * * *'    # 12:00 AM EST (midnight)
  workflow_dispatch:        # Allow manual trigger for testing

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to commit updated state file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: python -m monitor.main

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen_items.json
          git diff --cached --quiet || git commit -m "chore: update seen_items state [skip ci]"
          git push
